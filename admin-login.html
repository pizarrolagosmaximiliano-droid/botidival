<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Acceso Administrativo Seguro - Boti Dival">
    <title>Acceso Seguro - Boti Dival</title>
    <script>
        window.BASE_URL = (() => {
            const href = window.location.href;
            if (href.includes('github.io') || href.includes('botidival')) {
                return '/botidival/';
            }
            return '/';
        })();
    </script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        :root {
            --bg-color: #f8f9fc;
            --card-bg: #ffffff;
            --primary-blue: #0d6efd;
            --primary-hover: #0b5ed7;
            --glow-cyan: #0dcaf0;
            --text-dark: #212529;
            --text-muted: #6c757d;
            --border-light: #e9ecef;
        }

        body, html {
            height: 100%;
            margin: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-dark);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* Luces difuminadas en el fondo */
        .bg-glow {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: 0;
            opacity: 0.4;
        }

        .glow-1 {
            top: -10%;
            left: -5%;
            width: 40vw;
            height: 40vw;
            background: rgba(13, 110, 253, 0.15);
        }

        .glow-2 {
            bottom: -15%;
            right: -10%;
            width: 50vw;
            height: 50vw;
            background: rgba(13, 202, 240, 0.12);
        }

        /* Líneas abstractas sutiles */
        .bg-lines {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(rgba(13, 110, 253, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(13, 110, 253, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: 0;
            transform: perspective(1000px) rotateX(70deg) scale(2.5) translateY(-20%);
            animation: moveLines 30s linear infinite;
        }

        @keyframes moveLines {
            0% { background-position: 0 0; }
            100% { background-position: 0 60px; }
        }

        .login-container {
            width: 100%;
            max-width: 450px;
            padding: 20px;
            position: relative;
            z-index: 1;
        }

        /* Halo de luz elegante detrás del card */
        .login-container::before {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 100%; height: 100%;
            background: var(--primary-blue);
            filter: blur(100px);
            opacity: 0.15;
            z-index: -1;
            border-radius: 50%;
            animation: pulseGlow 4s infinite alternate;
        }

        @keyframes pulseGlow {
            from { opacity: 0.1; transform: translate(-50%, -50%) scale(0.9); }
            to { opacity: 0.2; transform: translate(-50%, -50%) scale(1.1); }
        }

        .login-card {
            background: var(--card-bg);
            border: 1px solid rgba(13, 110, 253, 0.2);
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.05), 0 1px 3px rgba(0,0,0,0.05);
            overflow: hidden;
            animation: slideUpFade 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            position: relative;
            transform: translateY(0);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .login-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 25px 50px rgba(13, 110, 253, 0.1), 0 5px 15px rgba(0,0,0,0.05);
        }

        @keyframes slideUpFade {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Borde superior luminoso */
        .login-card::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 3px;
            background: linear-gradient(90deg, var(--glow-cyan), var(--primary-blue), var(--glow-cyan));
            background-size: 200% auto;
            animation: shineGradient 3s linear infinite;
        }

        @keyframes shineGradient {
            to { background-position: 200% center; }
        }

        .card-inner {
            padding: 45px 40px 30px;
        }

        .login-header {
            text-align: center;
            margin-bottom: 35px;
        }

        .brand-icon {
            font-size: 36px;
            color: var(--primary-blue);
            margin-bottom: 15px;
            background: rgba(13, 110, 253, 0.1);
            width: 70px;
            height: 70px;
            line-height: 70px;
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 20px rgba(13, 110, 253, 0.15);
        }

        .login-header h1 {
            font-size: 26px;
            font-weight: 700;
            margin: 0 0 5px;
            color: var(--text-dark);
            letter-spacing: -0.5px;
        }

        .login-header p {
            font-size: 14px;
            color: var(--text-muted);
            margin: 0;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        @media (max-width: 576px) {
            .card-inner {
                padding: 35px 25px 25px;
            }
            .login-header h1 {
                font-size: 22px;
            }
            .login-container {
                padding: 15px;
            }
            body {
                overflow-y: auto; /* Allow scroll if content is long */
                display: block;
                padding-top: 40px;
            }
            .login-container {
                margin: 0 auto;
            }
        }

        .divider {
            height: 2px;
            width: 60px;
            background: linear-gradient(90deg, var(--primary-blue), var(--glow-cyan));
            margin: 20px auto 0;
            border-radius: 2px;
            box-shadow: 0 0 8px rgba(13, 202, 240, 0.5);
        }

        .form-group {
            margin-bottom: 22px;
            position: relative;
        }

        .form-label {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-dark);
            margin-bottom: 8px;
            display: block;
        }

        .input-group-custom {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-icon {
            position: absolute;
            left: 16px;
            color: #a0a5ab;
            font-size: 15px;
            transition: color 0.3s ease;
        }

        .form-control {
            background-color: #fff;
            border: 1px solid var(--border-light);
            color: var(--text-dark);
            padding: 13px 15px 13px 45px;
            border-radius: 8px;
            font-size: 15px;
            transition: all 0.3s ease;
            width: 100%;
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.02);
        }

        .form-control:focus {
            background-color: #fff;
            border-color: var(--primary-blue);
            box-shadow: 0 0 0 4px rgba(13, 110, 253, 0.15);
            outline: none;
        }

        .form-control::placeholder {
            color: #adb5bd;
        }

        .form-control:focus + .input-icon {
            color: var(--primary-blue);
            text-shadow: 0 0 5px rgba(13, 110, 253, 0.3);
        }

        .toggle-password {
            position: absolute;
            right: 15px;
            color: #a0a5ab;
            cursor: pointer;
            transition: color 0.3s;
            background: none;
            border: none;
            padding: 0;
        }

        .toggle-password:hover {
            color: var(--primary-blue);
        }

        .options-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
            font-size: 13.5px;
        }

        .form-check-input {
            border-color: #ced4da;
            cursor: pointer;
            margin-top: 0.15rem;
        }

        .form-check-input:checked {
            background-color: var(--primary-blue);
            border-color: var(--primary-blue);
        }

        .form-check-label {
            color: var(--text-muted);
            cursor: pointer;
            padding-left: 5px;
            font-weight: 500;
        }

        .forgot-link {
            color: var(--primary-blue);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s;
        }

        .forgot-link:hover {
            color: var(--primary-hover);
            text-decoration: underline;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary-blue) 0%, #0043a8 100%);
            border: none;
            color: white;
            padding: 14px;
            font-weight: 600;
            border-radius: 8px;
            font-size: 16px;
            width: 100%;
            transition: all 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            box-shadow: 0 8px 20px rgba(13, 110, 253, 0.3);
            position: relative;
            overflow: hidden;
        }

        /* Efecto de luz pasando por el botón */
        .btn-primary::after {
            content: '';
            position: absolute;
            top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transform: skewX(-20deg);
            animation: buttonShine 3s infinite;
        }

        @keyframes buttonShine {
            0% { left: -100%; }
            20% { left: 200%; }
            100% { left: 200%; }
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, var(--primary-hover) 0%, #003688 100%);
            transform: translateY(-2px);
            box-shadow: 0 12px 25px rgba(13, 110, 253, 0.4);
            color: white;
        }

        .btn-primary:disabled {
            background: #e9ecef;
            color: #6c757d;
            box-shadow: none;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background-color: #fff;
            border: 1px solid rgba(13, 110, 253, 0.3);
            color: var(--primary-blue);
            padding: 13px;
            font-weight: 600;
            border-radius: 8px;
            font-size: 15px;
            width: 100%;
            transition: all 0.3s ease;
            margin-top: 15px;
            text-align: center;
            display: block;
            text-decoration: none;
        }

        .btn-secondary:hover {
            border-color: var(--primary-blue);
            color: var(--primary-hover);
            background-color: rgba(13, 110, 253, 0.05);
            text-decoration: none;
        }

        .login-footer {
            background-color: #f8f9fc;
            padding: 18px 20px;
            border-top: 1px solid var(--border-light);
            text-align: center;
            font-size: 12.5px;
        }

        .security-info {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            color: #059669;
            margin-bottom: 6px;
            font-weight: 600;
        }

        .security-info i {
            font-size: 14px;
        }

        .copyright {
            color: var(--text-muted);
            font-weight: 500;
        }

        .alert-message {
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 22px;
            font-size: 14px;
            display: none;
            font-weight: 500;
            border-left: 4px solid;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .alert-error {
            background-color: #fff5f5;
            color: #e53e3e;
            border-color: #e53e3e;
            display: block;
        }

        .alert-success {
            background-color: #f0fdf4;
            color: #16a34a;
            border-color: #16a34a;
            display: block;
        }

        .spinner-border {
            width: 1.2rem;
            height: 1.2rem;
            border-width: 0.15em;
            display: none;
        }

        @media (max-width: 480px) {
            body, html {
                height: auto;
                min-height: 100%;
                overflow-y: auto;
                padding: 20px 0;
            }
            .bg-lines, .bg-glow {
                display: none; /* Desactivar efectos pesados en móvil */
            }
            .login-container {
                padding: 10px;
                max-width: 95%;
            }
            .card-inner { padding: 30px 20px 20px; }
            .login-header h1 { font-size: 22px; }
            .login-card { border-radius: 12px; }
            .form-control { font-size: 16px; } /* Evitar zoom automático en iOS */
            .btn-primary { padding: 16px; }
        }
    </style>
</head>
<body>
    <div class="bg-glow glow-1"></div>
    <div class="bg-glow glow-2"></div>
    <div class="bg-lines"></div>

    <div class="login-container">
        <div class="login-card">
            <div class="card-inner">
                <div class="login-header">
                    <h1>Boti Dival</h1>
                    <p>Acceso Administrativo</p>
                    <div class="divider"></div>
                </div>

                <div id="sessionMessage" class="alert-message"></div>
                <div id="errorMessage" class="alert-message"></div>

                <form id="loginForm">
                    <div class="form-group">
                        <label class="form-label" for="email">Correo Electrónico</label>
                        <div class="input-group-custom">
                            <input type="email" class="form-control" id="email" placeholder="admin@botidival.com" autocomplete="email" required>
                            <i class="fas fa-envelope input-icon"></i>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="password">Contraseña</label>
                        <div class="input-group-custom">
                            <input type="password" class="form-control" id="password" placeholder="••••••••••" autocomplete="current-password" required>
                            <i class="fas fa-lock input-icon"></i>
                            <button type="button" class="toggle-password" id="togglePassword" aria-label="Mostrar contraseña">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>

                    <div class="options-row">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="rememberMe">
                            <label class="form-check-label" for="rememberMe">
                                Recordar sesión
                            </label>
                        </div>
                        <a href="#" class="forgot-link" onclick="window.forceResetAdmin(); return false;">Restablecer acceso</a>
                    </div>

                    <button type="submit" class="btn-primary" id="loginBtn">
                        <span class="spinner-border spinner-border-sm" id="loginSpinner" role="status" aria-hidden="true"></span>
                        <span id="loginBtnText">Iniciar Sesión</span>
                    </button>
                    
                    <a href="index.html" class="btn-secondary">
                        Volver al Inicio
                    </a>
                </form>
            </div>

            <div class="login-footer">
                <div class="security-info">
                    <i class="fas fa-shield-check"></i> Conexión segura cifrada
                </div>
                <div class="copyright">
                    Solo personal autorizado.<br>
                    v1.0.0 • Boti Dival
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="security-utils.js"></script>
    <script src="users.db.js"></script>
    <script src="auth.js"></script>
    <script>
        // SCRIPT DE RESCATE GLOBAL
        window.forceResetAdmin = async () => {
            if(!confirm('¿Deseas restablecer las credenciales de fábrica y desbloquear la cuenta?')) return;
            console.log('🚀 Iniciando reset forzado...');
            
            try {
                localStorage.clear();
                const STORAGE_KEY = 'boti_dival_users_v2';
                
                // Generar hash de forma segura con la nueva API
                const db = new UsersDatabase();
                const newHash = await db.simpleHash('58442332');
                
                const defaultAdmin = [{
                    id: 1,
                    email: 'admin@botidival.com',
                    passwordHash: newHash,
                    role: 'admin',
                    name: 'Administrador Dival',
                    active: true
                }];
                
                localStorage.setItem(STORAGE_KEY, JSON.stringify(defaultAdmin));
                alert('✅ Sistema restablecido con éxito. Intenta entrar ahora con la clave 58442332');
                location.reload();
            } catch (e) {
                console.error('Error en reset:', e);
                alert('Error al restablecer. Por favor intenta de nuevo.');
            }
        };

        // Verificar integridad del sistema
        window.addEventListener('load', () => {
            console.log('✅ Sistema de seguridad listo (Web Crypto API)');
        });
    </script>
    
    <script>
        // Funcionalidad para mostrar/ocultar contraseña
        document.getElementById('togglePassword').addEventListener('click', function() {
            const passwordInput = document.getElementById('password');
            const icon = this.querySelector('i');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
                icon.style.color = 'var(--primary-blue)';
            } else {
                passwordInput.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
                icon.style.color = '';
            }
        });
    </script>
    <script src="admin-login.js"></script>
</body>
</html>
