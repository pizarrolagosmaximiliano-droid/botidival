<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Administrador - Panel de Ventas</title>
    <script>
        // Calcular BASE_URL antes de cargar recursos
        window.BASE_URL = (() => {
            const href = window.location.href;
            if (href.includes('github.io') || href.includes('botidival')) {
                return '/botidival/';
            }
            return '/';
        })();
    </script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" id="adminCssLink" href="">
    <script>
        document.getElementById('adminCssLink').href = window.BASE_URL + 'admin.css';
    </script>
</head>
<body class="bg-light">
    <div class="container d-flex justify-content-center align-items-center vh-100">
        <div class="card shadow-lg" style="width: 100%; max-width: 400px;">
            <div class="card-body">
                <h2 class="card-title text-center mb-4">Login Administrador</h2>
                <form id="loginForm">
                    <div class="mb-3">
                        <label for="username" class="form-label">Usuario</label>
                        <input type="text" class="form-control" id="username" required>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Contraseña</label>
                        <input type="password" class="form-control" id="password" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Iniciar Sesión</button>
                </form>
                <div id="errorMessage" class="text-danger mt-3 text-center" style="display: none;">Usuario o contraseña incorrectos.</div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script id="adminJsLink" src=""></script>
    <script>
        document.getElementById('adminJsLink').src = window.BASE_URL + 'admin.js';
    </script>
</body>
</html>
