<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Panel de administración seguro - Boti Dival">
    <title>🔐 Login Seguro - Boti Dival Admin</title>
    <script>
        // Calcular BASE_URL antes de cargar recursos
        window.BASE_URL = (() => {
            const href = window.location.href;
            if (href.includes('github.io') || href.includes('botidival')) {
                return '/botidival/';
            }
            return '/';
        })();
    </script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="admin.css">
    <style>
        .login-container {
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-card {
            width: 100%;
            max-width: 420px;
            border: 1px solid #D4AF37;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(212, 175, 55, 0.1), 0 0 1px rgba(212, 175, 55, 0.3);
            overflow: hidden;
        }

        .login-header {
            background: linear-gradient(135deg, #D4AF37 0%, #C41E3A 100%);
            padding: 30px 20px;
            text-align: center;
            color: white;
        }

        .login-header h1 {
            font-size: 28px;
            margin: 0;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .login-header p {
            margin: 8px 0 0 0;
            font-size: 13px;
            opacity: 0.95;
        }

        .login-body {
            padding: 30px;
            background: #0a0a0a;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            color: #D4AF37;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-control {
            background: #1a1a1a;
            border: 1px solid #333;
            color: #fff;
            padding: 12px 15px;
            border-radius: 6px;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            background: #1a1a1a;
            border-color: #D4AF37;
            color: #fff;
            box-shadow: 0 0 0 0.2rem rgba(212, 175, 55, 0.25);
        }

        .form-control::placeholder {
            color: #666;
        }

        .btn-login {
            background: linear-gradient(135deg, #D4AF37 0%, #C41E3A 100%);
            border: none;
            color: white;
            padding: 12px;
            font-weight: 600;
            border-radius: 6px;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            width: 100%;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(212, 175, 55, 0.3);
            color: white;
            text-decoration: none;
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .btn-login:disabled {
            background: #666;
            opacity: 0.6;
            cursor: not-allowed;
        }

        .alert-message {
            padding: 12px 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 13px;
            display: none;
            border-left: 4px solid;
        }

        .alert-error {
            background: rgba(196, 30, 58, 0.1);
            border-color: #C41E3A;
            color: #ff6b6b;
            display: block;
        }

        .alert-info {
            background: rgba(212, 175, 55, 0.1);
            border-color: #D4AF37;
            color: #ffd43b;
            display: block;
        }

        .alert-success {
            background: rgba(51, 216, 132, 0.1);
            border-color: #33d884;
            color: #51f876;
            display: block;
        }

        .loading {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid #D4AF37;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .login-footer {
            text-align: center;
            padding: 15px 20px;
            background: #1a1a1a;
            border-top: 1px solid #333;
            font-size: 12px;
            color: #666;
        }

        .spinner-container {
            text-align: center;
            margin: 20px 0;
        }

        @media (max-width: 480px) {
            .login-card {
                max-width: 100%;
            }
            
            .login-header h1 {
                font-size: 22px;
            }

            .login-body {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <h1>🍺 Boti Dival</h1>
                <p>Panel de Administración Seguro</p>
            </div>

            <div class="login-body">
                <!-- Mensaje de sesión expirada -->
                <div id="sessionMessage" class="alert-message"></div>

                <!-- Mensaje de error -->
                <div id="errorMessage" class="alert-message"></div>

                <!-- Formulario de Login -->
                <form id="loginForm">
                    <div class="form-group">
                        <label for="email" class="form-label">📧 Email</label>
                        <input 
                            type="email" 
                            class="form-control" 
                            id="email" 
                            placeholder="usuario@botidival.com"
                            autocomplete="email"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="password" class="form-label">🔐 Contraseña</label>
                        <input 
                            type="password" 
                            class="form-control" 
                            id="password" 
                            placeholder="••••••••••"
                            autocomplete="current-password"
                            required
                        >
                    </div>

                    <div class="form-check mb-3">
                        <input 
                            class="form-check-input" 
                            type="checkbox" 
                            id="rememberMe"
                            style="background: #D4AF37; border-color: #D4AF37;"
                        >
                        <label class="form-check-label" for="rememberMe" style="color: #b0b0b0; font-size: 13px;">
                            Recordarme en este dispositivo
                        </label>
                    </div>

                    <button type="submit" class="btn-login" id="loginBtn">
                        Iniciar Sesión Segura
                    </button>
                </form>
            </div>

            <div class="login-footer">
                <span style="color: #999;">🔒 Conexión Segura Encriptada</span><br>
                <span style="color: #666; font-size: 11px;">v1.0.0 • Boti Dival 2025</span>
            </div>
        </div>
    </div>

    <!-- Scripts requeridos -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.0/crypto-js.min.js"></script>
    <script src="users.db.js"></script>
    <script src="auth.js"></script>
    <script src="admin-login.js"></script>
</body>
</html>
